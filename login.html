<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<input type="text" id="username" placeholder="Username">
<button onclick="login()">Login</button>

<script>
function login() {
    const user = document.getElementById("username").value;
    localStorage.setItem("user", user);
    window.location.href = "index.html";
}
</script>

</body>
</html>
